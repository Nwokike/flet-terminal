name: Build Multi-Platform Studio

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version"
        required: true
        default: "0.1.0"
      build_number:
        description: "Build number"
        required: true
        default: "1"
  push:
    tags:
      - 'v*'

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.12"
  BUILD_VERSION: ${{ inputs.build_version || '0.1.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '1' }}

jobs:
  # ─── Web (PWA Studio Demo) ──────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Web PWA
        run: |
          cd examples/flet_terminal_example
          uv run flet build web --yes --project fletterminalstudio --product "FletTerminal Studio" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: web-build
          path: examples/flet_terminal_example/build/web/

  # ─── Linux (.tar.gz Bundle & Portable Executable) ──────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install Linux Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Build Linux Bundle
        run: |
          cd examples/flet_terminal_example
          uv run flet build linux --yes --project fletterminalstudio --product "FletTerminal Studio" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - name: Package Universal Linux tar.gz
        run: |
          mkdir -p build/dist
          tar -czf build/dist/FletTerminalStudio_${{ env.BUILD_VERSION }}_linux_x86_64.tar.gz -C examples/flet_terminal_example/build/linux .
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: linux-build
          path: build/dist/

  # ─── Windows Portable Executable ───────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build Windows Executable
        run: |
          cd examples/flet_terminal_example
          uv run flet build windows --yes --project fletterminalstudio --product "FletTerminal Studio" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: windows-build
          path: examples/flet_terminal_example/build/windows/

  # ─── Android APK (split per ABI) ───────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build Android APK (split per ABI)
        run: |
          cd examples/flet_terminal_example
          uv run flet build apk --yes --project fletterminalstudio --product "FletTerminal Studio" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} --split-per-abi -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: android-apk-split
          path: examples/flet_terminal_example/build/apk/
