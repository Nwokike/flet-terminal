name: Build Multi-Platform & Create Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version"
        required: true
        default: "0.2.2"
      build_number:
        description: "Build number"
        required: true
        default: "1"

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.12"
  BUILD_VERSION: ${{ inputs.build_version || '0.2.2' }}
  BUILD_NUMBER: ${{ inputs.build_number || '1' }}

jobs:
  # ─── 0. Create Release Tag & Placeholder ───────────────
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      TAG_NAME: ${{ steps.tag_info.outputs.TAG_NAME }}
      RELEASE_NAME: ${{ steps.tag_info.outputs.RELEASE_NAME }}
      IS_PRERELEASE: ${{ steps.tag_info.outputs.IS_PRERELEASE }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Release Tag & Name
        id: tag_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Flet Terminal ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "TAG_NAME=build-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Automated Build (${SHORT_SHA})" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release Placeholder
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_info.outputs.TAG_NAME }}
          name: ${{ steps.tag_info.outputs.RELEASE_NAME }}
          prerelease: ${{ steps.tag_info.outputs.IS_PRERELEASE }}
          make_latest: true
          body: "Automated multi-platform build generated from commit `${{ github.sha }}`."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 1. Linux (.tar.gz Bundle & Portable Executable) ───
  build-linux:
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install Linux Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Pre-compile binary wheels
        run: |
          mkdir -p wheels
          uv build --wheel --out-dir wheels/ .
      - name: Build Linux Bundle
        env:
          PIP_FIND_LINKS: ${{ github.workspace }}/wheels
        run: |
          cd examples/flet_terminal_example
          uv run flet build linux --yes --project fletterminal --product "Flet Terminal" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - name: Package Universal Linux tar.gz
        run: |
          mkdir -p build/dist
          tar -czf build/dist/FletTerminal_linux_x86_64.tar.gz -C examples/flet_terminal_example/build/linux .
      - name: Upload directly to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.TAG_NAME }}
          files: build/dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 2. Windows Portable Executable ────────────────────
  build-windows:
    needs: [prepare-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Pre-compile binary wheels
        shell: bash
        run: |
          mkdir -p wheels
          uv build --wheel --out-dir wheels/ .
      - name: Build Windows Executable
        shell: bash
        env:
          PIP_FIND_LINKS: ${{ github.workspace }}/wheels
        run: |
          cd examples/flet_terminal_example
          uv run flet build windows --yes --project fletterminal --product "Flet Terminal" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - name: Package Windows Executable Zip
        shell: bash
        run: |
          mkdir -p build/dist
          uv run python -c "import shutil; shutil.make_archive('build/dist/FletTerminal_windows_x64', 'zip', 'examples/flet_terminal_example/build/windows')"
      - name: Upload directly to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.TAG_NAME }}
          files: build/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


